<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光影集 · 3D 展览馆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #060607;
    overflow: hidden;
    font-family: Georgia, "Noto Serif SC", "SimSun", serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas { display: block; }
  .ui { position: fixed; width: 100%; text-align: center; color: #e8e4dc; pointer-events: none; z-index: 10; transition: opacity 0.5s; }
  .ui.top { top: 6vh; }
  .ui .kicker { font-family: sans-serif; font-size: 0.68rem; letter-spacing: 0.6em; color: #c9a468; text-transform: uppercase; }
  .ui h1 { font-weight: 400; font-size: clamp(1.6rem, 5vw, 2.4rem); letter-spacing: 0.35em; margin-top: 0.7rem; text-shadow: 0 4px 30px rgba(0,0,0,0.9); }
  .ui.bottom { bottom: 4vh; font-family: sans-serif; font-size: 0.7rem; letter-spacing: 0.22em; color: #8a867e; padding: 0 1rem; }
  .classic-link {
    position: fixed; top: 1.2rem; right: 1.4rem; z-index: 200;
    font-family: sans-serif; font-size: 0.72rem; letter-spacing: 0.2em;
    color: #8a867e; text-decoration: none;
    border: 1px solid rgba(138,134,126,0.35); padding: 0.5em 1.1em; border-radius: 2em;
    background: rgba(6,6,7,0.55);
  }
  .classic-link:hover { color: #c9a468; border-color: #c9a468; }
  .walk-btn {
    position: fixed; bottom: 4.5vh; z-index: 150;
    width: 62px; height: 62px; border-radius: 50%;
    border: 1px solid rgba(201,164,104,0.5);
    background: rgba(10,10,12,0.55);
    color: #c9a468; font-size: 1.4rem;
    display: none;
    align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .walk-btn:active { background: rgba(201,164,104,0.25); }
  #btnFwd { right: 5vw; }
  #btnBack { left: 5vw; }
  @media (pointer: coarse) {
    .walk-btn { display: flex; }
    .ui.bottom { bottom: 13vh; }
  }
  .lightbox {
    position: fixed; inset: 0; background: rgba(4,4,5,0.96);
    display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 1.2rem;
    opacity: 0; pointer-events: none; transition: opacity 0.35s; z-index: 300;
    padding: 1rem;
  }
  .lightbox.open { opacity: 1; pointer-events: auto; }
  .lightbox img { max-width: 94vw; max-height: 76vh; box-shadow: 0 30px 90px rgba(0,0,0,0.9); }
  .lightbox .cap { letter-spacing: 0.35em; color: #c9a468; font-size: 0.95rem; }
  .lightbox .tip { font-family: sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; color: #8a867e; }
  #loading {
    position: fixed; inset: 0; background: #060607; z-index: 400;
    display: flex; flex-direction: column; gap: 1.2rem; justify-content: center; align-items: center;
    color: #8a867e; letter-spacing: 0.4em; font-size: 0.8rem;
    transition: opacity 0.6s;
  }
  #loading .bar { width: 180px; height: 1px; background: rgba(138,134,126,0.25); overflow: hidden; }
  #loading .bar i { display: block; height: 100%; width: 0%; background: #c9a468; transition: width 0.3s; }
</style>
</head>
<body>
<a class="classic-link" href="index.html">← 返回首页</a>
<div id="loading"><span>正在布展 …</span><div class="bar"><i id="loadBar"></i></div></div>
<div class="ui top" id="titleUi">
  <div class="kicker">A Cinematic Photography Gallery</div>
  <h1>光 影 之 间</h1>
</div>
<div class="ui bottom" id="hintUi"></div>
<button class="walk-btn" id="btnFwd" aria-label="前进">▲</button>
<button class="walk-btn" id="btnBack" aria-label="后退">▼</button>
<div class="lightbox" id="lb">
  <img id="lbImg" src="" alt="">
  <div class="cap" id="lbCap"></div>
  <div class="tip">点击任意处关闭</div>
</div>
<script src="photos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script>
(function () {
  if (typeof THREE === "undefined" || !window.WebGLRenderingContext) {
    location.replace("index.html");
    return;
  }
  var renderer;
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true });
  } catch (e) {
    location.replace("index.html");
    return;
  }

  var isTouch = window.matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;
  document.getElementById("hintUi").textContent = isTouch
    ? "左右滑动转头 · 上下滑动或按 ▲▼ 走动 · 点画看大图"
    : "↑↓ / W S 或滚轮走动 · 按住鼠标左右转头 · 走近点击画框看大图";

  var sections = window.SECTIONS || { works: [], inspiration: [] };
  var exhibits = [];
  sections.works.forEach(function (p) { exhibits.push({ src: p, tag: "我的作品" }); });
  if (!sections.works.length) exhibits.push({ empty: true, tag: "我的作品" });
  sections.inspiration.forEach(function (p) { exhibits.push({ src: p, tag: "灵感收藏" }); });

  function titleOf(p) {
    return decodeURIComponent(p).split("/").pop().replace(/\.[^.]+$/, "").replace(/^\d+[-_.\s]*/, "");
  }

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x060607);
  scene.fog = new THREE.Fog(0x060607, 6, 30);

  var camera = new THREE.PerspectiveCamera(64, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 8);

  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, isTouch ? 1.5 : 2));
  renderer.shadowMap.enabled = !isTouch;
  document.body.appendChild(renderer.domElement);

  var HALL_W = 7;
  var HALL_LEN = Math.max(30, exhibits.length * 4.6 + 18);
  var Z0 = 10;

  var floor = new THREE.Mesh(
    new THREE.PlaneGeometry(HALL_W, HALL_LEN),
    new THREE.MeshStandardMaterial({ color: 0x141416, roughness: 0.25, metalness: 0.55 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.z = Z0 - HALL_LEN / 2;
  floor.receiveShadow = !isTouch;
  scene.add(floor);

  var ceil = new THREE.Mesh(
    new THREE.PlaneGeometry(HALL_W, HALL_LEN),
    new THREE.MeshStandardMaterial({ color: 0x0a0a0b, roughness: 0.95 })
  );
  ceil.rotation.x = Math.PI / 2;
  ceil.position.set(0, 4, Z0 - HALL_LEN / 2);
  scene.add(ceil);

  var wallMat = new THREE.MeshStandardMaterial({ color: 0x18181b, roughness: 0.9 });
  [-1, 1].forEach(function (side) {
    var wall = new THREE.Mesh(new THREE.PlaneGeometry(HALL_LEN, 4), wallMat);
    wall.position.set(side * HALL_W / 2, 2, Z0 - HALL_LEN / 2);
    wall.rotation.y = -side * Math.PI / 2;
    scene.add(wall);
  });
  var endWall = new THREE.Mesh(new THREE.PlaneGeometry(HALL_W, 4), wallMat);
  endWall.position.set(0, 2, Z0 - HALL_LEN);
  scene.add(endWall);
  var backWall = new THREE.Mesh(new THREE.PlaneGeometry(HALL_W, 4), wallMat);
  backWall.position.set(0, 2, Z0);
  backWall.rotation.y = Math.PI;
  scene.add(backWall);

  scene.add(new THREE.AmbientLight(0xffffff, 0.14));
  var entranceGlow = new THREE.PointLight(0xc9a468, 0.5, 15);
  entranceGlow.position.set(0, 3.2, 8);
  scene.add(entranceGlow);

  function textCanvas(text, sub, w, h, big) {
    var c = document.createElement("canvas");
    c.width = w; c.height = h;
    var ctx = c.getContext("2d");
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#c9a468";
    ctx.font = (big ? "300 " + h * 0.42 : "300 " + h * 0.34) + "px Georgia, 'Noto Serif SC', serif";
    var spaced = text.split("").join(" ");
    ctx.fillText(spaced, w / 2, sub ? h * 0.36 : h / 2);
    if (sub) {
      ctx.fillStyle = "#8a867e";
      ctx.font = "300 " + h * 0.2 + "px sans-serif";
      ctx.fillText(sub, w / 2, h * 0.74);
    }
    var tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
  }

  var endTitle = new THREE.Mesh(
    new THREE.PlaneGeometry(4.6, 1.15),
    new THREE.MeshBasicMaterial({ map: textCanvas("光影之间", "GALLERY OF LIGHT AND SHADOW", 1024, 256, true), transparent: true })
  );
  endTitle.position.set(0, 2.1, Z0 - HALL_LEN + 0.05);
  scene.add(endTitle);
  var endSpot = new THREE.SpotLight(0xffe9c4, 1.6, 12, 0.6, 0.6, 1.2);
  endSpot.position.set(0, 3.9, Z0 - HALL_LEN + 3.5);
  endSpot.target = endTitle;
  scene.add(endSpot);

  var loader = new THREE.TextureLoader();
  var frames = [];
  var loadTotal = exhibits.filter(function (e) { return !e.empty; }).length;
  var loadCount = 0;
  var loadBar = document.getElementById("loadBar");

  function done() {
    loadCount++;
    loadBar.style.width = Math.round(loadCount / Math.max(1, loadTotal) * 100) + "%";
    if (loadCount >= loadTotal) {
      var el = document.getElementById("loading");
      el.style.opacity = 0;
      setTimeout(function () { el.remove(); }, 700);
    }
  }
  if (loadTotal === 0) {
    var el = document.getElementById("loading");
    el.style.opacity = 0;
    setTimeout(function () { el.remove(); }, 700);
  }

  function hangPlaque(side, z, text, sub) {
    var plaque = new THREE.Mesh(
      new THREE.PlaneGeometry(1.1, 0.28),
      new THREE.MeshBasicMaterial({ map: textCanvas(text, sub, 512, 128, false), transparent: true })
    );
    plaque.position.set(side * (HALL_W / 2 - 0.03), 0.72, z);
    plaque.rotation.y = -side * Math.PI / 2;
    scene.add(plaque);
  }

  function addSpot(side, z, target, intensity) {
    var spot = new THREE.SpotLight(0xffe9c4, intensity, 9, 0.5, 0.55, 1.2);
    spot.position.set(side * (HALL_W / 2 - 1.6), 3.85, z);
    spot.target = target;
    spot.castShadow = !isTouch;
    scene.add(spot);
  }

  exhibits.forEach(function (ex, i) {
    var side = i % 2 === 0 ? -1 : 1;
    var z = 4 - i * 4.6;

    if (ex.empty) {
      var eg = new THREE.Mesh(
        new THREE.BoxGeometry(2.3, 1.7, 0.07),
        new THREE.MeshStandardMaterial({ color: 0x8a6f3d, roughness: 0.35, metalness: 0.7 })
      );
      eg.position.set(side * (HALL_W / 2 - 0.06), 1.9, z);
      eg.rotation.y = -side * Math.PI / 2;
      var inner = new THREE.Mesh(
        new THREE.PlaneGeometry(2.06, 1.46),
        new THREE.MeshStandardMaterial({ color: 0x121214, roughness: 0.9 })
      );
      inner.position.z = 0.043;
      eg.add(inner);
      var soon = new THREE.Mesh(
        new THREE.PlaneGeometry(1.9, 0.5),
        new THREE.MeshBasicMaterial({ map: textCanvas("第一卷胶片，正在路上", "COMING SOON", 768, 192, false), transparent: true })
      );
      soon.position.z = 0.05;
      eg.add(soon);
      scene.add(eg);
      addSpot(side, z, eg, 1.6);
      hangPlaque(side, z, "我的作品", "MY WORKS · 虚位以待");
      return;
    }

    loader.load(encodeURI(ex.src), function (tex) {
      var ratio = tex.image.width / tex.image.height;
      var h = 2.0, w = h * ratio;
      if (w > 3.3) { w = 3.3; h = w / ratio; }

      var frame = new THREE.Mesh(
        new THREE.BoxGeometry(w + 0.16, h + 0.16, 0.07),
        new THREE.MeshStandardMaterial({ color: 0x2b241a, roughness: 0.4, metalness: 0.6 })
      );
      frame.position.set(side * (HALL_W / 2 - 0.06), 1.9, z);
      frame.rotation.y = -side * Math.PI / 2;
      var pic = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshStandardMaterial({ map: tex, roughness: 0.65 })
      );
      pic.position.z = 0.043;
      frame.add(pic);
      frame.userData = { src: ex.src, title: titleOf(ex.src) };
      scene.add(frame);
      frames.push(frame);
      addSpot(side, z, frame, 2.2);
      hangPlaque(side, z, titleOf(ex.src), ex.tag === "我的作品" ? "MY WORK" : "COLLECTED · 图片来自网络");
      done();
    }, undefined, done);
  });

  var vz = 0, yaw = 0, targetYaw = 0, keys = {}, moveInput = 0;
  document.addEventListener("keydown", function (e) { keys[e.key.toLowerCase()] = true; });
  document.addEventListener("keyup", function (e) { keys[e.key.toLowerCase()] = false; });

  function bindWalk(btn, dir) {
    ["pointerdown", "touchstart"].forEach(function (ev) {
      btn.addEventListener(ev, function (e) { e.preventDefault(); moveInput = dir; }, { passive: false });
    });
    ["pointerup", "pointerleave", "touchend", "touchcancel"].forEach(function (ev) {
      btn.addEventListener(ev, function () { moveInput = 0; });
    });
  }
  bindWalk(document.getElementById("btnFwd"), -1);
  bindWalk(document.getElementById("btnBack"), 1);

  var dragging = false, lastX = 0, lastY = 0, movedDist = 0;
  renderer.domElement.addEventListener("pointerdown", function (e) {
    dragging = true; lastX = e.clientX; lastY = e.clientY; movedDist = 0;
  });
  window.addEventListener("pointermove", function (e) {
    if (!dragging) return;
    var dx = e.clientX - lastX;
    var dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    movedDist += Math.abs(dx) + Math.abs(dy);
    targetYaw -= dx * 0.0042;
    if (isTouch) vz += dy * 0.00085;
  });
  window.addEventListener("pointerup", function () { dragging = false; });
  window.addEventListener("wheel", function (e) { vz += e.deltaY * 0.0012; }, { passive: true });

  var ray = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  renderer.domElement.addEventListener("click", function (e) {
    if (movedDist > 10) return;
    mouse.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
    ray.setFromCamera(mouse, camera);
    var hits = ray.intersectObjects(frames, true);
    if (hits.length) {
      var obj = hits[0].object;
      while (obj && !(obj.userData && obj.userData.src)) obj = obj.parent;
      if (obj && camera.position.distanceTo(obj.position) < 8) {
        document.getElementById("lbImg").src = encodeURI(obj.userData.src);
        document.getElementById("lbCap").textContent = obj.userData.title;
        document.getElementById("lb").classList.add("open");
      }
    }
  });
  document.getElementById("lb").addEventListener("click", function () { this.classList.remove("open"); });

  var titleUi = document.getElementById("titleUi");
  var minZ = Z0 - HALL_LEN + 1.4, maxZ = 8.6;

  function animate() {
    requestAnimationFrame(animate);
    var accel = 0;
    if (keys["w"] || keys["arrowup"]) accel = -0.012;
    if (keys["s"] || keys["arrowdown"]) accel = 0.012;
    if (moveInput) accel = moveInput * 0.012;
    vz += accel;
    vz *= 0.9;
    yaw += (targetYaw - yaw) * 0.12;
    camera.rotation.y = yaw;
    camera.position.x += Math.sin(yaw) * vz * -1;
    camera.position.z += Math.cos(yaw) * vz;
    camera.position.x = Math.max(-HALL_W / 2 + 0.7, Math.min(HALL_W / 2 - 0.7, camera.position.x));
    camera.position.z = Math.max(minZ, Math.min(maxZ, camera.position.z));
    camera.position.y = 1.6 + Math.sin(Date.now() * 0.0016) * 0.012;
    titleUi.style.opacity = Math.max(0, Math.min(1, (camera.position.z - 2) / 5));
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", function () {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
})();
</script>
</body>
</html>
